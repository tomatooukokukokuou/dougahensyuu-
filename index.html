<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>iPad Cut Cutter - 簡易動画カット編集</title>
  
  <!-- Apple Mobile Web App Meta -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CutCutter">
  
  <!-- Google Fonts & Lucide Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="brand">
        <i data-lucide="scissors" class="brand-icon"></i>
        <h1>Cut<span>Cutter</span></h1>
        <span class="badge">iPad Edition</span>
      </div>
      <div class="header-actions">
        <label for="video-import" class="btn btn-primary">
          <i data-lucide="plus-circle"></i>
          <span>動画を読み込む</span>
          <input type="file" id="video-import" accept="video/*" style="display: none;">
        </label>
        <button id="btn-export" class="btn btn-success" disabled>
          <i data-lucide="download"></i>
          <span>書き出し</span>
        </button>
      </div>
    </header>

    <!-- Main Workspace -->
    <main class="app-workspace">
      <!-- Left Side: Previewer -->
      <section class="preview-section">
        <div class="preview-wrapper">
          <div class="video-container">
            <video id="main-video" playsinline></video>
            <div id="video-placeholder" class="video-placeholder">
              <i data-lucide="clapperboard" class="placeholder-icon"></i>
              <p>動画を読み込んで編集を開始してください</p>
            </div>
            <!-- 再生位置・時間表示 -->
            <div class="time-overlay">
              <span id="current-time-display">00:00.00</span>
              <span class="time-divider">/</span>
              <span id="total-time-display">00:00.00</span>
            </div>
          </div>
          
          <!-- プレビューコントローラー -->
          <div class="preview-controls">
            <button id="btn-prev-frame" class="btn btn-icon" title="1フレーム戻る">
              <i data-lucide="chevron-left"></i>
            </button>
            <button id="btn-play-pause" class="btn btn-icon btn-play" title="再生/一時停止">
              <i data-lucide="play"></i>
            </button>
            <button id="btn-next-frame" class="btn btn-icon" title="1フレーム進む">
              <i data-lucide="chevron-right"></i>
            </button>
          </div>
        </div>
      </section>

      <!-- Right Side: Clip Controls & Information -->
      <section class="control-section">
        <div class="card clip-info-card">
          <h3>選択中のクリップ</h3>
          <div id="clip-info-content" class="clip-info-empty">
            <p>タイムライン上のクリップを選択すると詳細が表示されます</p>
          </div>
        </div>

        <div class="editor-actions">
          <button id="btn-split" class="btn btn-action" disabled>
            <i data-lucide="scissors"></i>
            <span>ここを分割 (Split)</span>
          </button>
          <button id="btn-delete" class="btn btn-action btn-danger" disabled>
            <i data-lucide="trash-2"></i>
            <span>クリップ削除</span>
          </button>
        </div>
      </section>
    </main>

    <!-- Bottom: Timeline -->
    <footer class="app-timeline-container">
      <div class="timeline-ruler" id="timeline-ruler">
        <!-- 時間目盛がJSで動的に挿入される -->
      </div>
      <div class="timeline-scroll-container" id="timeline-scroll-container">
        <div class="timeline-track" id="timeline-track">
          <!-- クリップがJSで挿入される -->
          <div class="playhead" id="playhead">
            <div class="playhead-handle" id="playhead-handle"></div>
          </div>
        </div>
      </div>
    </footer>

    <!-- Rendering Modal / Toast -->
    <div id="export-modal" class="modal">
      <div class="modal-content">
        <div class="loader-spinner"></div>
        <h3>動画を出力中...</h3>
        <p>プレビューを再生しながらキャプチャしています。少々お待ちください。</p>
        <div class="progress-bar-container">
          <div id="export-progress" class="progress-bar"></div>
        </div>
        <span id="export-percentage">0%</span>
      </div>
    </div>

    <!-- Restore Project Modal -->
    <div id="restore-modal" class="modal">
      <div class="modal-content">
        <i data-lucide="history" style="width: 48px; height: 48px; color: var(--accent-color);"></i>
        <h3>編集データの復元</h3>
        <p>前回の編集データが見つかりました。復元するには、元の動画ファイルをもう一度選択してください。</p>
        <div class="restore-file-box" style="background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); padding: 12px 18px; border-radius: 12px; width: 100%; text-align: left; margin: 10px 0;">
          <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">対象ファイル:</div>
          <div id="restore-filename" style="font-weight: 600; color: var(--text-primary); font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">-</div>
        </div>
        <div style="display: flex; gap: 12px; width: 100%;">
          <label for="restore-file-import" class="btn btn-primary" style="flex: 1;">
            <i data-lucide="upload-cloud"></i>
            <span>ファイルを選択</span>
            <input type="file" id="restore-file-import" accept="video/*" style="display: none;">
          </label>
          <button id="btn-restore-cancel" class="btn" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); flex: 0.5;">
            <span>破棄</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- App Entry Scripts -->
  <script type="module" src="src/app.js"></script>
</body>
</html>
